# SISM Main Application Configuration
# 战略指标任务管理系统 - 主应用配置

server:
  port: 8080

spring:
  application:
    name: sism-backend
  
  # Database Configuration
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:24}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:6}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT:10000}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT:120000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME:600000}
      connection-test-query: SELECT 1
      validation-timeout: ${DB_HIKARI_VALIDATION_TIMEOUT:5000}
      leak-detection-threshold: 60000
      keepalive-time: ${DB_HIKARI_KEEPALIVE_TIME:60000}
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: none  # 禁用自动更新,使用 Flyway 管理
    open-in-view: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: false
    baseline-version: 1
    connect-retries: 10
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:${SPRING_MAIL_HOST:}}
    port: ${MAIL_PORT:${SPRING_MAIL_PORT:25}}
    username: ${MAIL_USERNAME:${MAIL_NOREPLY_USERNAME:${SPRING_MAIL_USERNAME:}}}
    password: ${MAIL_PASSWORD:${MAIL_NOREPLY_PASSWORD:${SPRING_MAIL_PASSWORD:}}}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}}
          starttls:
            enable: ${MAIL_USE_STARTTLS:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}}
            required: ${MAIL_STARTTLS_REQUIRED:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:false}}
          ssl:
            enable: ${MAIL_USE_SSL:${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:false}}
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_TIMEOUT:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:5000}

  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

# Spring Boot Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_EXPOSED_ENDPOINTS:health}
      base-path: /api/v1/actuator
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:never}
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sism: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_SQL_BINDER:WARN}

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SWAGGER_ENABLED:false}

app:
  security:
    public-docs-enabled: ${PUBLIC_DOCS_ENABLED:${SWAGGER_ENABLED:false}}
    public-actuator-enabled: ${PUBLIC_ACTUATOR_ENABLED:false}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

auth:
  login:
    max-failures: ${AUTH_LOGIN_MAX_FAILURES:5}
    lock-duration-seconds: ${AUTH_LOGIN_LOCK_DURATION_SECONDS:900}
  password-reset:
    code-expiration-seconds: ${AUTH_PASSWORD_RESET_CODE_EXPIRATION_SECONDS:600}
    resend-cooldown-seconds: ${AUTH_PASSWORD_RESET_RESEND_COOLDOWN_SECONDS:60}
    daily-limit: ${AUTH_PASSWORD_RESET_DAILY_LIMIT:10}
    ip-hourly-limit: ${AUTH_PASSWORD_RESET_IP_HOURLY_LIMIT:20}
    max-failed-attempts: ${AUTH_PASSWORD_RESET_MAX_FAILED_ATTEMPTS:5}
    lock-duration-seconds: ${AUTH_PASSWORD_RESET_LOCK_DURATION_SECONDS:1800}

# WebSocket Configuration
websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:}

# File Upload Configuration
file:
  upload:
    path: ${FILE_UPLOAD_PATH:${user.home}/.sism/uploads}
    max-size: 31457280  # 30MB

# Export Configuration
export:
  temp-dir: ./exports
  max-records: 100000
