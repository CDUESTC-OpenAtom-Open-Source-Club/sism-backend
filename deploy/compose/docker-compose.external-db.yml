services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    networks:
      default:
        aliases:
          - backend
          - backend.dns.podman
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      JAVA_HEAP_SIZE: ${JAVA_HEAP_SIZE:-384m}
      JAVA_METASPACE_SIZE: ${JAVA_METASPACE_SIZE:-128m}
      JAVA_STACK_SIZE: ${JAVA_STACK_SIZE:-512k}
      DB_HIKARI_MAX_POOL_SIZE: ${DB_HIKARI_MAX_POOL_SIZE:-2}
      DB_HIKARI_MIN_IDLE: ${DB_HIKARI_MIN_IDLE:-1}
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8080"
    volumes:
      - backend_uploads:/root/.sism/uploads
      - backend_exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/actuator/health | grep '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:80"
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  backend_uploads:
  backend_exports:

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-production}_default
