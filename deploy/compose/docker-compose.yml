services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - backend
          - backend.dns.podman
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}?stringtype=unspecified
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED}
      JAVA_HEAP_SIZE: ${JAVA_HEAP_SIZE:-384m}
      JAVA_METASPACE_SIZE: ${JAVA_METASPACE_SIZE:-128m}
      JAVA_STACK_SIZE: ${JAVA_STACK_SIZE:-512k}
      DB_HIKARI_MAX_POOL_SIZE: ${DB_HIKARI_MAX_POOL_SIZE:-2}
      DB_HIKARI_MIN_IDLE: ${DB_HIKARI_MIN_IDLE:-1}
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8080"
    volumes:
      - backend_uploads:/root/.sism/uploads
      - backend_exports:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/v1/actuator/health | grep '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:80"
    volumes:
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  backend_uploads:
  backend_exports:

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-production}_default
