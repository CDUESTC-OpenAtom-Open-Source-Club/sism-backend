# CI Pipeline - Build, Test, and Validate
# Runs on pull requests and pushes to main branch

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Compile code
        run: mvn clean compile -B

      - name: Run tests
        run: mvn test -B

      - name: Generate test coverage report
        run: mvn jacoco:report -B

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/target/site/jacoco/**

  validate-migrations:
    name: Validate Flyway Migrations
    runs-on: ubuntu-24.04
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Validate migration naming and duplicates
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          migration_dir = pathlib.Path("sism-main/src/main/resources/db/migration")
          pattern = re.compile(r"^V([0-9]+(?:\.[0-9]+)?)__.+\.sql$")

          versions = {}
          errors = []

          for file in sorted(migration_dir.glob("V*__*.sql")):
            match = pattern.match(file.name)
            if not match:
              errors.append(f"Invalid migration filename: {file.name}")
              continue
            version = match.group(1)
            if version in versions:
              errors.append(
                f"Duplicate migration version {version}: {versions[version]} and {file.name}"
              )
            versions[version] = file.name

          if errors:
            print("\\n".join(errors))
            sys.exit(1)

          print(f"Validated {len(versions)} Flyway migration filenames.")
          PY

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-24.04
    needs: build-and-test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Maven verify
        run: mvn verify -B -DskipTests

      - name: Check for compilation warnings
        run: |
          echo "[INFO] Checking for compilation warnings..."
          mvn clean compile -B 2>&1 | tee compile.log
          if grep -i "warning" compile.log; then
            echo "[WARN] Compilation warnings found"
          else
            echo "[INFO] No compilation warnings"
          fi
