name: Build and Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Deployment mode
        required: false
        default: full-stack
        type: choice
        options:
          - full-stack
          - backend-only
          - frontend-only
      frontend_tag:
        description: Frontend image tag override
        required: false
        default: main
        type: string
      target_env:
        description: Target environment name
        required: false
        default: production
        type: string
      db_mode:
        description: Database mode
        required: false
        default: internal
        type: choice
        options:
          - external
          - internal

permissions:
  contents: read
  packages: write
  deployments: write

concurrency:
  group: backend-deploy-${{ github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"

jobs:
  qa:
    name: QA
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_mode != 'frontend-only' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run backend verification
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: mvn -B clean verify

      - name: Build backend package
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: mvn -B -pl sism-main -am clean package -Dmaven.test.skip=true -Dmaven.javadoc.skip=true

      - name: Validate Flyway migration naming
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          migration_dir = pathlib.Path("sism-main/src/main/resources/db/migration")
          pattern = re.compile(r"^V([0-9]+(?:\.[0-9]+)?)__.+\.sql$")

          versions = {}
          errors = []

          for file in sorted(migration_dir.glob("V*__*.sql")):
              match = pattern.match(file.name)
              if not match:
                  errors.append(f"Invalid migration filename: {file.name}")
                  continue
              version = match.group(1)
              if version in versions:
                  errors.append(f"Duplicate migration version {version}: {versions[version]} and {file.name}")
              versions[version] = file.name

          if errors:
              print("\\n".join(errors))
              sys.exit(1)

          print(f"Validated {len(versions)} Flyway migration filenames.")
          PY

  build-and-push:
    name: Build and Push
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_mode != 'frontend-only' }}
    needs: qa
    runs-on: ubuntu-latest

    outputs:
      backend_image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/sism-backend" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:main

  deploy:
    name: Deploy Stack
    if: >-
      ${{
        always() &&
        (github.ref_name == 'main' || github.event_name == 'workflow_dispatch') &&
        !contains(join(needs.*.result, ','), 'failure')
      }}
    needs:
      - qa
      - build-and-push
    runs-on: [self-hosted, Linux, X64]
    environment:
      name: ${{ github.event.inputs.target_env || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deployment metadata
        id: meta
        run: |
          set -euo pipefail
          TARGET_ENV="${{ github.event.inputs.target_env || 'production' }}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            DEPLOY_MODE="${{ github.event.inputs.deploy_mode || 'full-stack' }}"
            FRONTEND_TAG="${{ github.event.inputs.frontend_tag || 'main' }}"
            DB_MODE="${{ github.event.inputs.db_mode || 'internal' }}"
          else
            DEPLOY_MODE="full-stack"
            FRONTEND_TAG="main"
            DB_MODE="internal"
          fi
          echo "target_env=${TARGET_ENV}" >> "$GITHUB_OUTPUT"
          echo "deploy_mode=${DEPLOY_MODE}" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=${FRONTEND_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "db_mode=${DB_MODE}" >> "$GITHUB_OUTPUT"

      - name: Create deployment record
        id: create_deployment
        uses: actions/github-script@v8
        with:
          script: |
            const response = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.BACKEND_REF,
              environment: process.env.TARGET_ENV,
              description: `System deployment via sism-backend (frontend tag: ${process.env.FRONTEND_TAG}, mode: ${process.env.DEPLOY_MODE})`,
              required_contexts: [],
              transient_environment: false,
              production_environment: process.env.TARGET_ENV === 'production',
              auto_merge: false,
              payload: {
                system: 'sism',
                frontend_tag: process.env.FRONTEND_TAG,
                backend_ref: process.env.BACKEND_REF,
                deploy_mode: process.env.DEPLOY_MODE,
              },
            });
            core.setOutput('deployment_id', String(response.data.id));
        env:
          TARGET_ENV: ${{ steps.meta.outputs.target_env }}
          FRONTEND_TAG: ${{ steps.meta.outputs.frontend_tag }}
          BACKEND_REF: ${{ steps.meta.outputs.backend_ref }}
          DEPLOY_MODE: ${{ steps.meta.outputs.deploy_mode }}
          DB_MODE: ${{ steps.meta.outputs.db_mode }}

      - name: Mark deployment in progress
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'in_progress',
              environment: process.env.TARGET_ENV,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: `Deploying frontend:${process.env.FRONTEND_TAG} backend:${process.env.BACKEND_REF} mode:${process.env.DEPLOY_MODE}`,
            });
        env:
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          TARGET_ENV: ${{ steps.meta.outputs.target_env }}
          FRONTEND_TAG: ${{ steps.meta.outputs.frontend_tag }}
          BACKEND_REF: ${{ steps.meta.outputs.backend_ref }}
          DEPLOY_MODE: ${{ steps.meta.outputs.deploy_mode }}

      - name: Configure SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Missing SERVER_HOST secret}"
          : "${SERVER_USER:?Missing SERVER_USER secret}"
          : "${SERVER_SSH_KEY:?Missing SERVER_SSH_KEY secret}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 127.0.0.1 >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host ${SERVER_HOST}
            HostName 127.0.0.1
            User ${SERVER_USER}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            ConnectionAttempts 5
            ConnectTimeout 15
            ServerAliveInterval 15
            ServerAliveCountMax 4
          EOF
          chmod 600 ~/.ssh/config

      - name: Normalize image names
        id: image
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "frontend=ghcr.io/${OWNER}/strategic-task-management:${{ steps.meta.outputs.frontend_tag }}" >> "$GITHUB_OUTPUT"
          echo "backend=ghcr.io/${OWNER}/sism-backend:${{ steps.meta.outputs.backend_ref }}" >> "$GITHUB_OUTPUT"

      - name: Upload compose stack
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          REMOTE_DIR="/opt/sism-stack/${{ steps.meta.outputs.target_env }}"
          ssh "${SERVER_USER}@${SERVER_HOST}" "mkdir -p '${REMOTE_DIR}/nginx'"
          scp deploy/compose/docker-compose.yml "${SERVER_USER}@${SERVER_HOST}:${REMOTE_DIR}/docker-compose.yml"
          scp deploy/compose/docker-compose.external-db.yml "${SERVER_USER}@${SERVER_HOST}:${REMOTE_DIR}/docker-compose.external-db.yml"
          scp deploy/compose/nginx/frontend.conf "${SERVER_USER}@${SERVER_HOST}:${REMOTE_DIR}/nginx/frontend.conf"

      - name: Bootstrap runtime env file
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          FRONTEND_IMAGE: ${{ steps.image.outputs.frontend }}
          BACKEND_IMAGE: ${{ steps.image.outputs.backend }}
          TARGET_ENV: ${{ steps.meta.outputs.target_env }}
          DEPLOY_MODE: ${{ steps.meta.outputs.deploy_mode }}
          DB_MODE: ${{ steps.meta.outputs.db_mode }}
        run: |
          set -euo pipefail
          cat > /tmp/bootstrap-runtime-env.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          REMOTE_DIR="/opt/sism-stack/${TARGET_ENV}"
          ENV_FILE="${REMOTE_DIR}/.env"
          mkdir -p "${REMOTE_DIR}/nginx"
          generate_secret() { openssl rand -hex "$1"; }
          upsert_env() {
            local key="$1"
            local value="$2"
            if grep -q "^${key}=" "${ENV_FILE}" 2>/dev/null; then
              awk -v key="${key}" -v value="${value}" '
                BEGIN { replaced = 0 }
                index($0, key "=") == 1 { print key "=" value; replaced = 1; next }
                { print }
                END { if (!replaced) print key "=" value }
              ' "${ENV_FILE}" > "${ENV_FILE}.tmp"
              mv "${ENV_FILE}.tmp" "${ENV_FILE}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${ENV_FILE}"
            fi
          }
          if [[ ! -f "${ENV_FILE}" ]]; then
            {
              printf 'DB_MODE=%s\n' "${DB_MODE}"
              printf 'POSTGRES_DB=%s\n' 'sism_prod'
              printf 'POSTGRES_USER=%s\n' 'sism_prod_user'
              printf 'POSTGRES_PASSWORD=%s\n' "$(generate_secret 24)"
              printf 'DB_HOST=%s\n' '127.0.0.1'
              printf 'DB_PORT=%s\n' '5432'
              printf 'DB_URL=%s\n' 'jdbc:postgresql://127.0.0.1:5432/sism_prod?stringtype=unspecified'
              printf 'DB_USERNAME=%s\n' 'sism_prod_user'
              printf 'DB_PASSWORD=%s\n' "$(generate_secret 24)"
              printf 'JWT_SECRET=%s\n' "$(generate_secret 64)"
              printf 'ALLOWED_ORIGINS=%s\n' "http://${SERVER_HOST}"
              printf 'FRONTEND_IMAGE=%s\n' "${FRONTEND_IMAGE}"
              printf 'BACKEND_IMAGE=%s\n' "${BACKEND_IMAGE}"
              printf 'AUTO_LOAD_CLEAN_SEEDS=%s\n' 'true'
              printf 'SPRING_FLYWAY_ENABLED=%s\n' 'true'
              printf 'BACKEND_PORT=%s\n' '8080'
              printf 'FRONTEND_PORT=%s\n' '80'
            } > "${ENV_FILE}"
          fi
          upsert_env DB_MODE "${DB_MODE}"
          if [[ "${DEPLOY_MODE}" != "backend-only" ]]; then
            upsert_env FRONTEND_IMAGE "${FRONTEND_IMAGE}"
          fi
          if [[ "${DEPLOY_MODE}" != "frontend-only" ]]; then
            upsert_env BACKEND_IMAGE "${BACKEND_IMAGE}"
          fi
          grep -q '^SPRING_FLYWAY_ENABLED=' "${ENV_FILE}" || upsert_env SPRING_FLYWAY_ENABLED true
          grep -q '^AUTO_LOAD_CLEAN_SEEDS=' "${ENV_FILE}" || upsert_env AUTO_LOAD_CLEAN_SEEDS true
          grep -q '^BACKEND_PORT=' "${ENV_FILE}" || upsert_env BACKEND_PORT 8080
          grep -q '^FRONTEND_PORT=' "${ENV_FILE}" || upsert_env FRONTEND_PORT 80
          grep -q '^DB_HOST=' "${ENV_FILE}" || upsert_env DB_HOST 127.0.0.1
          grep -q '^DB_PORT=' "${ENV_FILE}" || upsert_env DB_PORT 5432
          grep -q '^DB_URL=' "${ENV_FILE}" || upsert_env DB_URL 'jdbc:postgresql://127.0.0.1:5432/sism_prod?stringtype=unspecified'
          grep -q '^DB_USERNAME=' "${ENV_FILE}" || upsert_env DB_USERNAME sism_prod_user
          grep -q '^DB_PASSWORD=' "${ENV_FILE}" || upsert_env DB_PASSWORD "$(generate_secret 24)"
          grep -q '^ALLOWED_ORIGINS=' "${ENV_FILE}" || upsert_env ALLOWED_ORIGINS "http://${SERVER_HOST}"
          SCRIPT
          chmod +x /tmp/bootstrap-runtime-env.sh
          REMOTE_BOOTSTRAP_SCRIPT="/tmp/bootstrap-runtime-env-${GITHUB_RUN_ID}.sh"
          scp /tmp/bootstrap-runtime-env.sh "${SERVER_USER}@${SERVER_HOST}:${REMOTE_BOOTSTRAP_SCRIPT}"
          ssh "${SERVER_USER}@${SERVER_HOST}" \
            "SERVER_HOST='${SERVER_HOST}' TARGET_ENV='${TARGET_ENV}' FRONTEND_IMAGE='${FRONTEND_IMAGE}' BACKEND_IMAGE='${BACKEND_IMAGE}' DEPLOY_MODE='${DEPLOY_MODE}' DB_MODE='${DB_MODE}' bash '${REMOTE_BOOTSTRAP_SCRIPT}' && rm -f '${REMOTE_BOOTSTRAP_SCRIPT}'"
          if [[ -n "${GHCR_USERNAME:-}" && -n "${GHCR_TOKEN:-}" ]]; then
            ssh "${SERVER_USER}@${SERVER_HOST}" "docker login ghcr.io -u '${GHCR_USERNAME}' -p '${GHCR_TOKEN}'"
          fi

      - name: Deploy stack on server
        id: deploy_stack
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_MODE: ${{ steps.meta.outputs.deploy_mode }}
          DB_MODE: ${{ steps.meta.outputs.db_mode }}
        run: |
          set -euo pipefail
          REMOTE_DIR="/opt/sism-stack/${{ steps.meta.outputs.target_env }}"
          START_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "deploy_start_utc=${START_TS}" >> "$GITHUB_OUTPUT"
          cat > /tmp/run-remote-deploy.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          REMOTE_DIR="$1"
          DEPLOY_MODE="$2"
          DB_MODE="$3"
          LOG_FILE="${REMOTE_DIR}/deploy-run.log"
          STATUS_FILE="${REMOTE_DIR}/deploy-status.env"
          LOCK_FILE="${REMOTE_DIR}/deploy.lock"
          START_TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PULL_TIMEOUT_SECONDS=1800
          PULL_MAX_ATTEMPTS=3
          exec 9>"${LOCK_FILE}"
          flock 9
          set_stage() {
            local stage="$1"
            local ts
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if grep -q '^DEPLOY_STAGE=' "${STATUS_FILE}" 2>/dev/null; then
              awk -v stage="${stage}" -v ts="${ts}" '
                BEGIN { stage_written = 0; ts_written = 0 }
                /^DEPLOY_STAGE=/ { print "DEPLOY_STAGE=" stage; stage_written = 1; next }
                /^DEPLOY_STAGE_TS=/ { print "DEPLOY_STAGE_TS=" ts; ts_written = 1; next }
                { print }
                END {
                  if (!stage_written) print "DEPLOY_STAGE=" stage;
                  if (!ts_written) print "DEPLOY_STAGE_TS=" ts;
                }
              ' "${STATUS_FILE}" > "${STATUS_FILE}.tmp"
              mv "${STATUS_FILE}.tmp" "${STATUS_FILE}"
            else
              {
                echo "DEPLOY_STAGE=${stage}"
                echo "DEPLOY_STAGE_TS=${ts}"
              } >> "${STATUS_FILE}"
            fi
          }
          ctr() {
            docker "$@"
          }
          pull_image() {
            local image="$1"
            local attempt
            for attempt in $(seq 1 "${PULL_MAX_ATTEMPTS}"); do
              echo "[deploy] pulling ${image}, attempt ${attempt}" >> "${LOG_FILE}" 2>&1
              set_stage "pull:${image}:attempt-${attempt}"
              if timeout "${PULL_TIMEOUT_SECONDS}" docker pull "${image}"; then
                return 0
              fi
              echo "[deploy] pull failed for ${image}, attempt ${attempt}" >> "${LOG_FILE}" 2>&1
              sleep 5
            done
            return 1
          }
          {
            echo "DEPLOY_START_UTC=${START_TS}"
            echo "FRONTEND_PULL_START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > "${STATUS_FILE}"
          record_failure() {
            local exit_code="$1"
            local fail_ts
            trap - ERR
            set +e
            fail_ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            {
              echo "DEPLOY_STATE=failure"
              echo "DEPLOY_END_UTC=${fail_ts}"
            } >> "${STATUS_FILE}"
            echo "[deploy] failure ${fail_ts} (exit ${exit_code})" >> "${LOG_FILE}" 2>&1
            exit "${exit_code}"
          }
          trap 'record_failure $?' ERR
          exec >> "${LOG_FILE}" 2>&1
            echo "[deploy] start ${START_TS}"
            cd "${REMOTE_DIR}"
            COMPOSE_FILE="docker-compose.yml"
            if [[ "${DB_MODE}" == "external" ]]; then
              COMPOSE_FILE="docker-compose.external-db.yml"
            fi
            set_stage "resolve-images"
            FRONTEND_IMAGE="$(awk -F= '/^FRONTEND_IMAGE=/{print $2}' .env)"
            BACKEND_IMAGE="$(awk -F= '/^BACKEND_IMAGE=/{print $2}' .env)"
            if [[ "${DEPLOY_MODE}" != "backend-only" ]]; then
              if ctr image inspect "${FRONTEND_IMAGE}" >/dev/null 2>&1; then
                echo "FRONTEND_PULL_MODE=refreshed" >> "${STATUS_FILE}"
              else
                echo "FRONTEND_PULL_MODE=pulled" >> "${STATUS_FILE}"
              fi
              pull_image "${FRONTEND_IMAGE}"
            else
              echo "FRONTEND_PULL_MODE=skipped" >> "${STATUS_FILE}"
            fi
            FRONTEND_PULL_END="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "FRONTEND_PULL_END_UTC=${FRONTEND_PULL_END}" >> "${STATUS_FILE}"

            echo "BACKEND_PULL_START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${STATUS_FILE}"
            if [[ "${DEPLOY_MODE}" != "frontend-only" ]]; then
              if ctr image inspect "${BACKEND_IMAGE}" >/dev/null 2>&1; then
                echo "BACKEND_PULL_MODE=cache-hit" >> "${STATUS_FILE}"
              else
                echo "BACKEND_PULL_MODE=pulled" >> "${STATUS_FILE}"
                pull_image "${BACKEND_IMAGE}"
              fi
            else
              echo "BACKEND_PULL_MODE=skipped" >> "${STATUS_FILE}"
            fi
            BACKEND_PULL_END="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "BACKEND_PULL_END_UTC=${BACKEND_PULL_END}" >> "${STATUS_FILE}"

            echo "STACK_UP_START_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${STATUS_FILE}"
            set_stage "compose-up"
            case "${DEPLOY_MODE}" in
              frontend-only)
                docker compose -f "${COMPOSE_FILE}" up -d --force-recreate --no-deps frontend
                ;;
              backend-only)
                docker compose -f "${COMPOSE_FILE}" up -d --force-recreate backend
                ;;
              *)
                docker compose -f "${COMPOSE_FILE}" up -d --force-recreate
                ;;
            esac
            STACK_UP_END="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            set_stage "compose-up-complete"
            {
              echo "STACK_UP_END_UTC=${STACK_UP_END}"
              echo "DEPLOY_STATE=success"
              echo "DEPLOY_END_UTC=${STACK_UP_END}"
            } >> "${STATUS_FILE}"
            echo "[deploy] success ${STACK_UP_END}"
          trap - ERR
          SCRIPT
          chmod +x /tmp/run-remote-deploy.sh
          scp /tmp/run-remote-deploy.sh "${SERVER_USER}@${SERVER_HOST}:${REMOTE_DIR}/run-remote-deploy.sh"
          ssh "${SERVER_USER}@${SERVER_HOST}" "
            set -e
            cd '${REMOTE_DIR}'
            for pid in \$(pgrep -f \"run-remote-deploy.sh ${REMOTE_DIR}\" || true); do
              if [ \"\$pid\" != \"\$\$\" ]; then kill \"\$pid\" || true; fi
            done
            for pid in \$(pgrep -f 'docker pull ghcr.io/.*/sism-backend' || true); do
              if [ \"\$pid\" != \"\$\$\" ]; then kill \"\$pid\" || true; fi
            done
            for pid in \$(pgrep -f 'docker pull ghcr.io/.*/strategic-task-management' || true); do
              if [ \"\$pid\" != \"\$\$\" ]; then kill \"\$pid\" || true; fi
            done
            setsid bash ./run-remote-deploy.sh '${REMOTE_DIR}' '${DEPLOY_MODE}' '${DB_MODE}' </dev/null >/dev/null 2>&1 &
            exit 0
          "

      - name: Upload clean seed bundle
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          REMOTE_DIR="/opt/sism-stack/${{ steps.meta.outputs.target_env }}"
          BUNDLE_DIR="$(mktemp -d)"
          mkdir -p "${BUNDLE_DIR}/seeds" "${BUNDLE_DIR}/scripts"
          cp -R database/seeds/. "${BUNDLE_DIR}/seeds/"
          cp database/scripts/bootstrap-local-seed-support.sql "${BUNDLE_DIR}/scripts/"
          cp database/scripts/validate-clean-seeds.sql "${BUNDLE_DIR}/scripts/"
          tar -C "${BUNDLE_DIR}" -czf /tmp/sism-seed-bundle.tgz .
          scp /tmp/sism-seed-bundle.tgz "${SERVER_USER}@${SERVER_HOST}:${REMOTE_DIR}/sism-seed-bundle.tgz"
          ssh "${SERVER_USER}@${SERVER_HOST}" "mkdir -p '${REMOTE_DIR}/seed-bundle' && tar -xzf '${REMOTE_DIR}/sism-seed-bundle.tgz' -C '${REMOTE_DIR}/seed-bundle' && rm -f '${REMOTE_DIR}/sism-seed-bundle.tgz'"

      - name: Load clean seeds when database is empty
        if: ${{ steps.meta.outputs.db_mode != 'external' }}
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -euo pipefail
          REMOTE_DIR="/opt/sism-stack/${{ steps.meta.outputs.target_env }}"
          ssh "${SERVER_USER}@${SERVER_HOST}" "REMOTE_DIR='${REMOTE_DIR}' bash -s" <<'SCRIPT'
          set -euo pipefail
          cd "${REMOTE_DIR}"

          AUTO_LOAD_CLEAN_SEEDS="$(awk -F= '/^AUTO_LOAD_CLEAN_SEEDS=/{print $2}' .env | tail -n 1)"
          POSTGRES_DB="$(awk -F= '/^POSTGRES_DB=/{print $2}' .env | tail -n 1)"
          POSTGRES_USER="$(awk -F= '/^POSTGRES_USER=/{print $2}' .env | tail -n 1)"

          if [[ "${AUTO_LOAD_CLEAN_SEEDS}" != "true" ]]; then
            echo "AUTO_LOAD_CLEAN_SEEDS is disabled, skipping clean seed bootstrap."
            exit 0
          fi

          USER_COUNT="$(
            docker exec production-postgres-1 psql \
              -U "${POSTGRES_USER}" \
              -d "${POSTGRES_DB}" \
              -tAc "SELECT COUNT(*) FROM public.sys_user;" | tr -d '[:space:]'
          )"
          ORG_COUNT="$(
            docker exec production-postgres-1 psql \
              -U "${POSTGRES_USER}" \
              -d "${POSTGRES_DB}" \
              -tAc "SELECT COUNT(*) FROM public.sys_org;" | tr -d '[:space:]'
          )"

          if [[ "${USER_COUNT}" != "0" || "${ORG_COUNT}" != "0" ]]; then
            echo "Database already has seed data (sys_user=${USER_COUNT}, sys_org=${ORG_COUNT}), skipping clean seed bootstrap."
            exit 0
          fi

          echo "Database is empty. Loading clean seed baseline."
          docker exec production-postgres-1 rm -rf /tmp/sism-seed-bundle || true
          docker cp "${REMOTE_DIR}/seed-bundle" production-postgres-1:/tmp/sism-seed-bundle

          docker exec production-postgres-1 psql \
            -U "${POSTGRES_USER}" \
            -d "${POSTGRES_DB}" \
            -f /tmp/sism-seed-bundle/scripts/bootstrap-local-seed-support.sql

          docker exec production-postgres-1 sh -lc \
            "cd /tmp/sism-seed-bundle/seeds && psql -U '${POSTGRES_USER}' -d '${POSTGRES_DB}' -f reset-and-load-clean-seeds.sql"

          docker exec production-postgres-1 psql \
            -U "${POSTGRES_USER}" \
            -d "${POSTGRES_DB}" \
            -f /tmp/sism-seed-bundle/scripts/validate-clean-seeds.sql
          SCRIPT

      - name: Verify stack health
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_MODE: ${{ steps.meta.outputs.deploy_mode }}
          DB_MODE: ${{ steps.meta.outputs.db_mode }}
        run: |
          set -euo pipefail
          REMOTE_DIR="/opt/sism-stack/${{ steps.meta.outputs.target_env }}"
          COMPOSE_FILE="docker-compose.yml"
          if [[ "${DB_MODE}" == "external" ]]; then
            COMPOSE_FILE="docker-compose.external-db.yml"
          fi
          DEPLOY_COMPLETED=false
          for i in $(seq 1 360); do
            STATUS_RAW="$(ssh "${SERVER_USER}@${SERVER_HOST}" "test -f '${REMOTE_DIR}/deploy-status.env' && cat '${REMOTE_DIR}/deploy-status.env' || true")"
            if printf '%s\n' "$STATUS_RAW" | grep -q '^DEPLOY_STATE=success$'; then
              DEPLOY_COMPLETED=true
              break
            fi
            if printf '%s\n' "$STATUS_RAW" | grep -q '^DEPLOY_STATE=failure$'; then
              echo "$STATUS_RAW"
              ssh "${SERVER_USER}@${SERVER_HOST}" "tail -200 '${REMOTE_DIR}/deploy-run.log' || true"
              exit 1
            fi
            sleep 5
          done
          if [[ "${DEPLOY_COMPLETED}" != "true" ]]; then
            echo "Deployment did not reach DEPLOY_STATE=success within polling window." >&2
            ssh "${SERVER_USER}@${SERVER_HOST}" "cat '${REMOTE_DIR}/deploy-status.env' 2>/dev/null || true" >&2
            ssh "${SERVER_USER}@${SERVER_HOST}" "tail -200 '${REMOTE_DIR}/deploy-run.log' || true" >&2
            exit 1
          fi
          STATUS_RAW="$(ssh "${SERVER_USER}@${SERVER_HOST}" "cat '${REMOTE_DIR}/deploy-status.env'")"
          echo "$STATUS_RAW"
          ssh "${SERVER_USER}@${SERVER_HOST}" "cd '${REMOTE_DIR}' && docker compose -f '${COMPOSE_FILE}' ps"
          if [[ "${DEPLOY_MODE}" != "frontend-only" ]]; then
            ssh "${SERVER_USER}@${SERVER_HOST}" '
              set -euo pipefail
              cd "'"${REMOTE_DIR}"'"
              BACKEND_PORT="$(awk -F= "/^BACKEND_PORT=/{print \$2}" .env | tail -n 1)"
              BACKEND_PORT="${BACKEND_PORT:-8080}"
              for i in $(seq 1 24); do
                if curl -fsS "http://127.0.0.1:${BACKEND_PORT}/api/v1/actuator/health" | grep -q "\"status\":\"UP\""; then
                  exit 0
                fi
                sleep 5
              done
              echo "Backend health check did not become UP in time" >&2
              docker ps --format "table {{.Names}}\t{{.Status}}" >&2 || true
              exit 1
            '
          fi
          if [[ "${DEPLOY_MODE}" != "backend-only" ]]; then
            ssh "${SERVER_USER}@${SERVER_HOST}" '
              set -euo pipefail
              cd "'"${REMOTE_DIR}"'"
              FRONTEND_PORT="$(awk -F= "/^FRONTEND_PORT=/{print \$2}" .env | tail -n 1)"
              FRONTEND_PORT="${FRONTEND_PORT:-80}"
              for i in $(seq 1 12); do
                if curl -fsS "http://127.0.0.1:${FRONTEND_PORT}/" >/dev/null; then
                  exit 0
                fi
                sleep 5
              done
              echo "Frontend health check did not become ready in time" >&2
              docker ps --format "table {{.Names}}\t{{.Status}}" >&2 || true
              exit 1
            '
          fi

      - name: Mark deployment success
        if: ${{ success() }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'success',
              environment: process.env.TARGET_ENV,
              environment_url: `http://${process.env.SERVER_HOST}/`,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: `Deployment succeeded with frontend:${process.env.FRONTEND_TAG}`,
            });
        env:
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          TARGET_ENV: ${{ steps.meta.outputs.target_env }}
          FRONTEND_TAG: ${{ steps.meta.outputs.frontend_tag }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

      - name: Mark deployment failure
        if: ${{ failure() }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'failure',
              environment: process.env.TARGET_ENV,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: `Deployment failed with frontend:${process.env.FRONTEND_TAG}`,
            });
        env:
          DEPLOYMENT_ID: ${{ steps.create_deployment.outputs.deployment_id }}
          TARGET_ENV: ${{ steps.meta.outputs.target_env }}
          FRONTEND_TAG: ${{ steps.meta.outputs.frontend_tag }}
